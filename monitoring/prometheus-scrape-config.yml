# Monitoring Enhancement: Prometheus Scrape Configuration for trace-context-lib
# Add this job to your prometheus.yml scrape_configs section.
scrape_configs:
  - job_name: 'trace-context-lib'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - 'localhost:{{ PORT }}'   # Replace with actual host:port
        labels:
          service: 'trace-context-lib'
          environment: 'production'
